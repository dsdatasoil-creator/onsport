<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON'SPORT — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/styles.css?v=1783541142">
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div id="logo-slot"></div>

    <div class="auth-tabs">
      <button id="tab-login" class="active">Connexion</button>
      <button id="tab-signup">Demande d'accès coach</button>
    </div>

    <div id="msg-slot"></div>

    <!-- LOGIN -->
    <form id="form-login">
      <div class="field">
        <label for="login-email">E-mail</label>
        <input type="email" id="login-email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">Se connecter</button>
      <p class="hint">Espace réservé aux administrateurs et coachs.</p>
    </form>

    <!-- SIGNUP (coach) -->
    <form id="form-signup" style="display:none;">
      <div class="field-row">
        <div class="field">
          <label for="su-first">Prénom</label>
          <input type="text" id="su-first" required>
        </div>
        <div class="field">
          <label for="su-last">Nom</label>
          <input type="text" id="su-last" required>
        </div>
      </div>
      <div class="field">
        <label for="su-phone">Téléphone</label>
        <input type="tel" id="su-phone">
      </div>
      <div class="field">
        <label for="su-email">E-mail</label>
        <input type="email" id="su-email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="su-password">Mot de passe</label>
        <input type="password" id="su-password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary">Envoyer ma demande</button>
      <p class="hint">Votre compte sera activé par un administrateur avant de pouvoir vous connecter.</p>
    </form>
  </div>
</div>

<script type="module">
import { supabase } from './js/supabaseClient.js';
import { renderLogo } from './assets/logo-inline.js';

renderLogo(document.getElementById('logo-slot'), { size: 40, editable: true });

const tabLogin = document.getElementById('tab-login');
const tabSignup = document.getElementById('tab-signup');
const formLogin = document.getElementById('form-login');
const formSignup = document.getElementById('form-signup');
const msgSlot = document.getElementById('msg-slot');

function showMsg(text, type = 'info') {
  msgSlot.innerHTML = `<div class="msg msg-${type}">${text}</div>`;
}
function clearMsg() { msgSlot.innerHTML = ''; }

tabLogin.addEventListener('click', () => {
  tabLogin.classList.add('active');
  tabSignup.classList.remove('active');
  formLogin.style.display = 'block';
  formSignup.style.display = 'none';
  clearMsg();
});
tabSignup.addEventListener('click', () => {
  tabSignup.classList.add('active');
  tabLogin.classList.remove('active');
  formSignup.style.display = 'block';
  formLogin.style.display = 'none';
  clearMsg();
});

// --- Redirection si déjà connecté ---
async function routeIfLoggedIn() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) return;

  const { data: profile, error } = await supabase
    .from('app_users')
    .select('role, is_active')
    .eq('user_id', session.user.id)
    .single();

  if (error || !profile) return;

  if (!profile.is_active) {
    showMsg("Votre compte est en attente d'activation par un administrateur.", 'info');
    return;
  }
  if (profile.role === 'admin') {
    window.location.href = 'admin.html';
  } else {
    window.location.href = 'coach.html';
  }
}
routeIfLoggedIn();

// --- Connexion ---
formLogin.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMsg();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg("Identifiants incorrects ou compte inconnu.", 'error');
    return;
  }
  await routeIfLoggedIn();
});

// --- Inscription (demande d'accès coach) ---
formSignup.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMsg();

  const first_name = document.getElementById('su-first').value.trim();
  const last_name = document.getElementById('su-last').value.trim();
  const phone = document.getElementById('su-phone').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const password = document.getElementById('su-password').value;

  const { error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: { first_name, last_name, phone, role: 'coach' },
    },
  });

  if (error) {
    showMsg(error.message, 'error');
    return;
  }
  showMsg("Demande envoyée. Un administrateur doit activer votre compte avant votre première connexion.", 'success');
  formSignup.reset();
});
</script>
</body>
</html>
